<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👁️ CLIENTE V25 · Diapositivas + Textos + Exportar PNG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f1724, #0a0f1a);
            padding: 20px;
            min-height: 100vh;
        }
        .dashboard { max-width: 1300px; margin: 0 auto; }
        h1 { color: #88ccff; text-align: center; margin-bottom: 1rem; }
        .waiting-box { background: #1e2b24; border-radius: 60px; padding: 24px; text-align: center; margin-bottom: 20px; font-size: 1.3rem; color: #ffd966; border: 1px solid #ffd966; }
        .jitsi-panel { background: #1f2a3a; border-radius: 2rem; overflow: hidden; border: 1px solid #4c9f70; margin-bottom: 20px; }
        .jitsi-header { background: #2c3e2f; padding: 10px; text-align: center; font-weight: bold; color: #ffd966; }
        .jitsi-frame { width: 100%; height: 400px; background: #111; }
        .pizarra-panel { background: rgba(255,255,255,0.08); backdrop-filter: blur(8px); border-radius: 2rem; padding: 1.2rem; border: 1px solid #88ccff; }
        canvas { background: white; border-radius: 1.5rem; display: block; width: 100%; height: auto; box-shadow: 0 0 15px rgba(0,0,0,0.4); }
        .info { text-align: center; color: #aaa; margin-top: 12px; font-size: 0.8rem; }
        .remote-badge { text-align: center; margin-top: 16px; font-size: 0.7rem; color: #4c9f70; }
        .slide-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .slide-counter { background: #1e2b24; padding: 6px 16px; border-radius: 40px; display: inline-block; }
        .export-png-btn {
            background: #4c9f70;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        .textos-area {
            margin-top: 20px;
            background: #1e2b24;
            border-radius: 28px;
            padding: 15px;
        }
        .textbox-card {
            background: #2d3e3a;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .textbox-label {
            font-weight: bold;
            color: #ffd966;
            min-width: 80px;
        }
        .textbox-value {
            flex: 3;
            padding: 8px;
            border-radius: 40px;
            border: 1px solid #88ccff;
            background: #1a2a2a;
            color: white;
            font-family: monospace;
        }
        .copy-btn {
            background: #4c9f70;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            color: white;
        }
    </style>
    <script src="https://8x8.vc/vpaas-magic-cookie-b74fcf0dc97943ddad2f5fc49881f391/external_api.js"></script>
</head>
<body>
<div class="dashboard">
    <h1>👁️ CLIENTE V25 · Controlado por el tutor</h1>
    <div id="waitingMessage" class="waiting-box">⏳ Esperando que el tutor active la sesión...</div>

    <div id="jitsiContainer" class="jitsi-panel" style="display: none;">
        <div class="jitsi-header">📹 Videoconferencia con el Tutor</div>
        <div id="jitsiFrame" class="jitsi-frame"></div>
    </div>

    <div id="pizarraContainer" class="pizarra-panel" style="display: none;">
        <div class="slide-header">
            <span class="slide-counter">Diapositiva <span id="slideNum">1</span> / <span id="totalSlides">1</span></span>
            <button id="exportPngBtn" class="export-png-btn">📸 Exportar PNG</button>
        </div>
        <canvas id="canvasCliente" width="800" height="500" style="width:100%; height:auto; aspect-ratio:800/500"></canvas>
        <div class="textos-area" id="textosContainer"></div>
        <div class="info">🔒 Modo lectura · ves los trazos, fondo e imagen del tutor en tiempo real</div>
    </div>
    <div class="remote-badge">🎮 El tutor puede activar/desactivar tu cámara y micrófono</div>
</div>

<script>
    let ws = null;
    let jitsiApi = null;
    let jitsiActivo = false;
    let nombreCliente = null;
    const SALA_JITSI_FIJA = 'sala-unica-tutor-v25';

    const waitingDiv = document.getElementById('waitingMessage');
    const jitsiContainerDiv = document.getElementById('jitsiContainer');
    const pizarraContainerDiv = document.getElementById('pizarraContainer');
    const canvas = document.getElementById('canvasCliente');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 500;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let slides = [];
    let currentSlide = 0;
    let imagenFondoActual = null;
    let colorFondoActual = '#ffffff';
    let trazosActuales = [];
    let textosActuales = ['', '', ''];
    let visibilidadActual = [true, true, true];

    function redibujarCanvasCompleto() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = colorFondoActual;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (imagenFondoActual) ctx.drawImage(imagenFondoActual, 0, 0, canvas.width, canvas.height);
        for (let t of trazosActuales) {
            ctx.beginPath(); ctx.moveTo(t.x0, t.y0); ctx.lineTo(t.x1, t.y1);
            ctx.strokeStyle = t.color; ctx.lineWidth = t.width; ctx.stroke();
        }
    }

    function renderTextos() {
        const container = document.getElementById('textosContainer');
        container.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            if (!visibilidadActual[i]) continue;
            const div = document.createElement('div');
            div.className = 'textbox-card';
            div.innerHTML = `
                <span class="textbox-label">📌 MSN_${i+1}:</span>
                <input type="text" class="textbox-value" value="${escapeHtml(textosActuales[i] || '')}" readonly>
                <button class="copy-btn" data-text="${escapeHtml(textosActuales[i] || '')}">📋 COPIAR</button>
            `;
            container.appendChild(div);
        }
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.onclick = () => {
                const txt = btn.getAttribute('data-text');
                if (txt) navigator.clipboard.writeText(txt);
            };
        });
    }

    function aplicarSlide(slideData) {
        colorFondoActual = slideData.colorFondo;
        trazosActuales = slideData.strokes || [];
        textosActuales = slideData.textos || ['', '', ''];
        visibilidadActual = slideData.visibilidad || [true, true, true];
        if (slideData.imagenFondoDataURL) {
            const img = new Image();
            img.onload = () => {
                imagenFondoActual = img;
                redibujarCanvasCompleto();
                renderTextos();
            };
            img.src = slideData.imagenFondoDataURL;
        } else {
            imagenFondoActual = null;
            redibujarCanvasCompleto();
            renderTextos();
        }
    }

    function conectarWebSocket() {
        const protocolo = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocolo}//${window.location.host}`);
        ws.onopen = () => ws.send(JSON.stringify({ tipo: 'soy_cliente' }));
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            console.log('📨 Cliente recibe:', msg);

            if (msg.tipo === 'toggle_jitsi_remoto') {
                if (msg.visible) {
                    if (!jitsiActivo) {
                        if (!nombreCliente) {
                            nombreCliente = prompt("Ingresa tu nombre para la videoconferencia:", "Cliente");
                            if (!nombreCliente) nombreCliente = "Cliente";
                        }
                        iniciarJitsiCliente();
                        jitsiActivo = true;
                    }
                    waitingDiv.style.display = 'none';
                    jitsiContainerDiv.style.display = 'block';
                } else {
                    jitsiContainerDiv.style.display = 'none';
                }
            }

            if (msg.tipo === 'toggle_pizarra_remota') {
                if (msg.visible) pizarraContainerDiv.style.display = 'block';
                else pizarraContainerDiv.style.display = 'none';
            }

            if (msg.tipo === 'full_state') {
                slides = msg.data.slides;
                currentSlide = msg.data.currentSlide;
                document.getElementById('slideNum').innerText = currentSlide + 1;
                document.getElementById('totalSlides').innerText = slides.length;
                if (slides[currentSlide]) aplicarSlide(slides[currentSlide]);
            }

            if (msg.tipo === 'slide_change') {
                currentSlide = msg.currentSlide;
                document.getElementById('slideNum').innerText = currentSlide + 1;
                document.getElementById('totalSlides').innerText = msg.slides.length;
                slides = msg.slides;
                if (slides[currentSlide]) aplicarSlide(slides[currentSlide]);
            }

            if (msg.tipo === 'draw') {
                trazosActuales.push(msg.data);
                ctx.beginPath(); ctx.moveTo(msg.data.x0, msg.data.y0); ctx.lineTo(msg.data.x1, msg.data.y1);
                ctx.strokeStyle = msg.data.color; ctx.lineWidth = msg.data.width; ctx.stroke();
            }

            if (msg.tipo === 'reset_pizarra_remota') {
                trazosActuales = [];
                redibujarCanvasCompleto();
            }

            if (msg.tipo === 'bg_color') {
                colorFondoActual = msg.color;
                redibujarCanvasCompleto();
            }

            if (msg.tipo === 'bg_image') {
                if (msg.dataURL) {
                    const img = new Image();
                    img.onload = () => { imagenFondoActual = img; redibujarCanvasCompleto(); };
                    img.src = msg.dataURL;
                } else {
                    imagenFondoActual = null;
                    redibujarCanvasCompleto();
                }
            }

            if (msg.tipo === 'text_change') {
                textosActuales[msg.textboxIndex] = msg.content;
                renderTextos();
            }

            if (msg.tipo === 'visibility_change') {
                visibilidadActual[msg.textboxIndex] = msg.visible;
                renderTextos();
            }

            if (msg.tipo === 'comando_mute_todos') {
                if (jitsiApi) {
                    jitsiApi.executeCommand('toggleAudio');
                    setTimeout(() => jitsiApi.executeCommand('setAudioMuted', [{ muted: true }]), 100);
                }
            }

            if (msg.tipo === 'comando_video_off_todos') {
                if (jitsiApi) jitsiApi.executeCommand('toggleVideo');
            }

            if (msg.tipo === 'tutor_desconectado') {
                waitingDiv.style.display = 'block';
                jitsiContainerDiv.style.display = 'none';
                pizarraContainerDiv.style.display = 'none';
                if (jitsiApi) { jitsiApi.dispose(); jitsiApi = null; }
                jitsiActivo = false;
                trazosActuales = [];
                imagenFondoActual = null;
                colorFondoActual = '#ffffff';
                textosActuales = ['', '', ''];
                visibilidadActual = [true, true, true];
                redibujarCanvasCompleto();
                renderTextos();
            }
        };
        ws.onclose = () => setTimeout(conectarWebSocket, 3000);
    }

    function iniciarJitsiCliente() {
        const container = document.getElementById('jitsiFrame');
        container.innerHTML = '';
        const options = {
            roomName: `vpaas-magic-cookie-b74fcf0dc97943ddad2f5fc49881f391/${SALA_JITSI_FIJA}`,
            width: '100%', height: '100%', parentNode: container,
            userInfo: { displayName: nombreCliente || 'Cliente' },
            configOverwrite: { startWithVideoMuted: true, startWithAudioMuted: true, disableDeepLinking: true },
            interfaceConfigOverwrite: { SHOW_JITSI_WATERMARK: false, SHOW_BRAND_WATERMARK: false, SHOW_POWERED_BY: false }
        };
        try { jitsiApi = new JitsiMeetExternalAPI("8x8.vc", options); }
        catch(e) { container.innerHTML = '<div style="padding:20px;color:#ffaa66;">⚠️ Error videoconferencia</div>'; }
    }

    document.getElementById('exportPngBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = `diapositiva_${currentSlide+1}.png`;
        link.href = canvas.toDataURL();
        link.click();
    };

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    slides = [{ colorFondo: '#ffffff', strokes: [], textos: ['', '', ''], visibilidad: [true, true, true], imagenFondoDataURL: null }];
    conectarWebSocket();
</script>
</body>
</html>
